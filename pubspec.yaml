name: secrets_of_the_copper_still
description: "Catalog vintage distillation apparatus — copper alembics, glass retorts, and fractional columns for collectors of industrial laboratory heritage."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#F6F2EC"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter_native_splash:
  color: "#181410"
  android: true
  ios: true
  image: "assets/images/logo.png"
  android_12:
    image: "assets/images/logo.png"
    color: "#181410"
